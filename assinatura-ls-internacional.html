<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>assinatura-ls-internacional</title>
  <style>
    :root{
      --ls-blue:#353ED4;
      --ls-teal:#00C6B1;
      --txt:#111114;
      --bg:#fafafa;
    }
    body{
      font-family:"Lydia Sans","Inter",Arial,sans-serif;
      margin:0;
      padding:24px;
      background:var(--bg);
      color:#111;
    }
    .app{
      max-width:960px;
      margin:0 auto;
      display:grid;
      gap:24px;
      grid-template-columns:1.1fr 1fr;
    }
    .card{
      background:#fff;
      border:1px solid #ddd;
      border-radius:16px;
      padding:18px;
      box-shadow:0 1px 4px rgba(0,0,0,.05);
    }
    h1{
      margin:0 0 8px;
      font-size:20px;
    }
    label{
      display:block;
      font-size:13px;
      margin:10px 0 4px;
    }
    input[type="text"]{
      width:100%;
      padding:10px 12px;
      border-radius:8px;
      border:1px solid #ccc;
      font-family:inherit;
      font-size:14px;
    }
    .btns{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    button{
      padding:10px 14px;
      border-radius:8px;
      border:1px solid #ccc;
      background:#fff;
      cursor:pointer;
      font-weight:600;
      font-family:inherit;
      font-size:14px;
    }
    button.primary{
      background:var(--ls-blue);
      border-color:var(--ls-blue);
      color:#fff;
    }
    .preview-wrap{
      display:flex;
      gap:18px;
      align-items:flex-start;
      flex-wrap:wrap;
    }
    .preview-card{
      background:#fff;
      border-radius:12px;
      padding:16px;
    }
    .sig-title{
      font-size:12px;
      color:#555;
      margin-bottom:8px;
      font-weight:600;
    }
    .mono{
      font-family:ui-monospace,Menlo,Consolas,monospace;
      font-size:12px;
      color:#555;
      overflow:auto;
      white-space:pre-wrap;
      word-break:break-all;
    }
  </style>
</head>
<body>

<div class="app">
  <div class="card">
    <h1>assinatura-ls-internacional</h1>

    <label>Nome</label>
    <input id="f-name" type="text" placeholder="Ex.: Filipa Freire" />

    <label>Cargo</label>
    <input id="f-role" type="text" placeholder="Ex.: Graphic Designer" />

    <label>T1 (telemóvel pessoal)</label>
    <input id="f-tm1" type="text" placeholder="Ex.: (+351) 9XX XXX XXX" />

    <label>T2 (telemóvel pessoal)</label>
    <input id="f-tm2" type="text" placeholder="Ex.: (+32) XXX XX XX XX" />

    <label>T3 (telemóvel pessoal)</label>
    <input id="f-tm3" type="text" placeholder="Ex.: (+33) X XX XX XX XX" />

    <label>Nome do ficheiro da foto</label>
    <input
      id="f-photo"
      type="text"
      placeholder="Ex.: ls_headshot-filipa-freire.png"
      value="ls_headshot-filipa-freire.png"
    />

    <div class="btns">
      <button class="primary" id="btn-render">Gerar / Atualizar</button>
      <button id="btn-copy">Copiar assinatura</button>
      <button id="btn-open">Abrir versão standalone</button>
      <button id="btn-link">Gerar link</button>
    </div>
  </div>

  <div class="card">
    <div class="preview-wrap">
      <div class="preview-card">
        <div class="sig-title">Pré-visualização</div>
        <div id="sig"></div>
      </div>

      <div class="card" style="min-width:260px">
        <div style="font-size:12px;color:#555;margin-bottom:8px;">Query string atual</div>
        <div id="qs" class="mono"></div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const BRAND = {
    officePhone: "(+351) 214 139 860",
    address: "Bélgica Rue des Colonies 11, 1000, Bruxelles",
    linkWeb: "https://www.landskill.com/",
    linkIG: "https://www.instagram.com/landskill_it/",
    linkLI: "https://www.linkedin.com/company/101356039/",
    logo: "https://www.landskill.com/signatures/ls_logo.png",
    arrow: "https://www.landskill.com/signatures/ls_seta.png",
    iso: "https://www.landskill.com/signatures/ls_certificacao-iso.png",
    iconWeb: "https://www.landskill.com/signatures/ls_icon-website.png",
    iconIG: "https://www.landskill.com/signatures/ls_icon-instagram.png",
    iconLI: "https://www.landskill.com/signatures/ls_icon-linkedin.png",
    iconPhone: "https://www.landskill.com/signatures/ls_telemovel.png",
    iconLoc: "https://www.landskill.com/signatures/ls_local.png",
    photoBase: "https://www.landskill.com/signatures/"
  };

  const $ = id => document.getElementById(id);
  const esc = t => String(t || "").replace(/[<>&"]/g, s => (
    { "<":"&lt;", ">":"&gt;", "&":"&amp;", '"':"&quot;" }[s]
  ));

  function signatureHTML(d){
    const name  = d.name  || "";
    const role  = d.role  || "";
    const tm1   = d.tm1   || "";
    const tm2   = d.tm2   || "";
    const tm3   = d.tm3   || "";
    const photoField = d.photo || "";

    const W_TABLE = 480;
    const W_PHOTO = 105;
    const W_ARROW = 14;
    const W_LOGO  = 92;
    const W_ICON  = 16;
    const W_ISO   = 56;

    let photoURL = photoField
      ? (/^https?:\/\//i.test(photoField) ? photoField : BRAND.photoBase + photoField)
      : BRAND.photoBase + "ls_headshot-filipa-freire.png";

    // 👇 Espaçamento maior entre números (Outlook safe)
    const personalJoined = [tm1, tm2, tm3]
      .filter(Boolean)
      .map(esc)
      .join('<span style="display:inline-block;width:18px;"></span>•<span style="display:inline-block;width:18px;"></span>');

    const personalLine = personalJoined
      ? `<tr>
           <td style="font-size:11px;font-weight:700;white-space:nowrap;">
             T: ${personalJoined}
           </td>
         </tr>`
      : ``;

    return `
<table role="presentation" cellpadding="0" cellspacing="0" border="0"
  style="border-collapse:collapse;font-family:'Lydia Sans',Arial,sans-serif;color:#111114;width:${W_TABLE}px;max-width:${W_TABLE}px;margin:0;">

<tr style="line-height:1;font-size:0;vertical-align:top;">
<td rowspan="3">
<img src="${photoURL}" width="${W_PHOTO}" style="display:block;border-radius:999px;" alt="">
</td>

<td style="padding:0 6px 0 0;">
<img src="${BRAND.arrow}" width="${W_ARROW}" style="display:block;" alt="">
</td>

<td style="padding:0 12px 0 0;">
<div style="font-size:16px;font-weight:600;color:#00C6B1;margin-bottom:5px;">${esc(name)}</div>
<div style="font-size:12px;color:#353ED4;margin-bottom:8px;">${esc(role)}</div>
</td>

<td style="text-align:center;">
<img src="${BRAND.logo}" width="${W_LOGO}" style="display:block;margin:0 auto;" alt="">
</td>
</tr>

<tr>
<td></td>
<td colspan="2" style="padding:4px 0;">
<table width="100%" cellpadding="0" cellspacing="0">
<tr><td style="height:1px;background:#00C6B1;"></td></tr>
</table>
</td>
</tr>

<tr>
<td></td>
<td style="padding:6px 12px 0 0;">
<table style="font-size:10px;border-collapse:collapse;">

${personalLine}

<tr>
<td style="padding-top:6px;">
<img src="${BRAND.iconPhone}" width="${W_ICON}" style="vertical-align:middle;margin-right:6px;">
${BRAND.officePhone}
</td>
</tr>

<tr>
<td style="padding-top:2px;">
<img src="${BRAND.iconLoc}" width="${W_ICON}" style="vertical-align:middle;margin-right:6px;">
${BRAND.address}
</td>
</tr>

</table>
</td>

<td style="text-align:center;">
<img src="${BRAND.iso}" width="${W_ISO}" style="display:block;margin:0 auto 8px;">
<a href="${BRAND.linkWeb}" target="_blank">
<img src="${BRAND.iconWeb}" width="${W_ICON}" style="margin-right:6px;">
</a>
<a href="${BRAND.linkIG}" target="_blank">
<img src="${BRAND.iconIG}" width="${W_ICON}" style="margin-right:6px;">
</a>
<a href="${BRAND.linkLI}" target="_blank">
<img src="${BRAND.iconLI}" width="${W_ICON}">
</a>
</td>
</tr>

</table>
`;
  }

  function paramsFromForm(){
    return new URLSearchParams({
      name:$('f-name').value,
      role:$('f-role').value,
      tm1:$('f-tm1').value,
      tm2:$('f-tm2').value,
      tm3:$('f-tm3').value,
      photo:$('f-photo').value
    }).toString();
  }

  function render(){
    const qs=paramsFromForm();
    $('qs').textContent='?'+qs;
    const params=Object.fromEntries(new URLSearchParams(qs));
    $('sig').innerHTML=signatureHTML(params);
  }

  document.getElementById('btn-render').onclick=e=>{e.preventDefault();render();};
  render();
})();
</script>
</body>
</html>
